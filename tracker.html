<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hand String Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 
                0 20px 60px rgba(0, 0, 0, 0.3),
                0 0 0 1px rgba(255, 255, 255, 0.5) inset;
            max-width: 1200px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 2em;
            font-weight: 600;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 25px;
            font-size: 0.95em;
        }

        .video-container {
            position: relative;
            width: 100%;
            max-width: 800px;
            margin: 0 auto 20px;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 
                0 10px 40px rgba(0, 0, 0, 0.2),
                0 0 0 2px rgba(255, 255, 255, 0.3) inset;
        }

        #input_video {
            display: none;
        }

        #output_canvas {
            width: 100%;
            height: auto;
            display: block;
            background: #000;
            transform: scaleX(-1); /* Mirror effect */
        }

        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 30px;
            font-size: 1em;
            font-weight: 600;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #startBtn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        #startBtn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        #stopBtn {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(245, 87, 108, 0.4);
        }

        #stopBtn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(245, 87, 108, 0.6);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .status {
            text-align: center;
            margin-top: 15px;
            padding: 10px;
            border-radius: 8px;
            font-weight: 500;
            font-size: 0.9em;
        }

        .status.active {
            background: rgba(102, 126, 234, 0.1);
            color: #667eea;
        }

        .status.inactive {
            background: rgba(245, 87, 108, 0.1);
            color: #f5576c;
        }

        .legend {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85em;
            color: #555;
        }

        .legend-color {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        }

        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }
            
            h1 {
                font-size: 1.5em;
            }
            
            .legend {
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🖐️ Hand String Tracker</h1>
        <p class="subtitle">Lihat string berwarna menghubungkan setiap jari Anda!</p>
        
        <div class="video-container">
            <video id="input_video"></video>
            <canvas id="output_canvas"></canvas>
        </div>
        
        <div class="controls">
            <button id="startBtn">▶ Mulai Kamera</button>
            <button id="stopBtn" disabled>⏹ Stop</button>
        </div>
        
        <div id="status" class="status inactive">Kamera belum aktif</div>
        
        <div class="legend">
            <div class="legend-item">
                <div class="legend-color" style="background: #FF6B6B;"></div>
                <span>Ibu Jari</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background: #4ECDC4;"></div>
                <span>Jari Telunjuk</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background: #45B7D1;"></div>
                <span>Jari Tengah</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background: #96CEB4;"></div>
                <span>Jari Manis</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background: #FFEAA7;"></div>
                <span>Jari Kelingking</span>
            </div>
        </div>
    </div>

    <script>
        const videoElement = document.getElementById('input_video');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const statusDiv = document.getElementById('status');
        
        let camera = null;
        let hands = null;
        let isRunning = false;

        // Warna untuk setiap jari
        const fingerColors = {
            thumb: '#FF6B6B',      // Merah Coral
            index: '#4ECDC4',      // Tosca
            middle: '#45B7D1',     // Biru Langit
            ring: '#96CEB4',       // Hijau Mint
            pinky: '#FFEAA7'       // Kuning Pastel
        };

        // Definisi koneksi untuk setiap jari
        const fingerConnections = {
            thumb: [0, 1, 2, 3, 4],
            index: [0, 5, 6, 7, 8],
            middle: [0, 9, 10, 11, 12],
            ring: [0, 13, 14, 15, 16],
            pinky: [0, 17, 18, 19, 20]
        };

        function onResults(results) {
            // Set ukuran canvas sesuai video
            canvasElement.width = videoElement.videoWidth;
            canvasElement.height = videoElement.videoHeight;
            
            // Clear canvas
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            
            // Gambar video sebagai background
            canvasCtx.save();
            canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);
            canvasCtx.restore();
            
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                for (const landmarks of results.multiHandLandmarks) {
                    drawFingerStrings(landmarks);
                }
            }
        }

        function drawFingerStrings(landmarks) {
            // Gambar string untuk setiap jari
            for (const [fingerName, indices] of Object.entries(fingerConnections)) {
                const color = fingerColors[fingerName];
                
                // Gambar garis penghubung antar titik jari
                for (let i = 0; i < indices.length - 1; i++) {
                    const startPoint = landmarks[indices[i]];
                    const endPoint = landmarks[indices[i + 1]];
                    
                    drawSmoothString(startPoint, endPoint, color);
                }
                
                // Gambar landmark points dengan efek glow
                for (const index of indices) {
                    const point = landmarks[index];
                    drawGlowingPoint(point.x, point.y, color);
                }
            }
        }

        function drawSmoothString(start, end, color) {
            const startX = start.x * canvasElement.width;
            const startY = start.y * canvasElement.height;
            const endX = end.x * canvasElement.width;
            const endY = end.y * canvasElement.height;
            
            // Buat gradient untuk efek smooth
            const gradient = canvasCtx.createLinearGradient(startX, startY, endX, endY);
            gradient.addColorStop(0, color);
            gradient.addColorStop(1, adjustColor(color, -30));
            
            // Shadow untuk efek 3D
            canvasCtx.shadowColor = color;
            canvasCtx.shadowBlur = 15;
            canvasCtx.shadowOffsetX = 0;
            canvasCtx.shadowOffsetY = 0;
            
            // Gambar garis dengan stroke tebal dan rounded
            canvasCtx.beginPath();
            canvasCtx.moveTo(startX, startY);
            canvasCtx.lineTo(endX, endY);
            canvasCtx.strokeStyle = gradient;
            canvasCtx.lineWidth = 6;
            canvasCtx.lineCap = 'round';
            canvasCtx.lineJoin = 'round';
            canvasCtx.stroke();
            
            // Reset shadow
            canvasCtx.shadowColor = 'transparent';
            canvasCtx.shadowBlur = 0;
        }

        function drawGlowingPoint(x, y, color) {
            const pixelX = x * canvasElement.width;
            const pixelY = y * canvasElement.height;
            
            // Outer glow
            canvasCtx.shadowColor = color;
            canvasCtx.shadowBlur = 20;
            
            // Lingkaran luar
            canvasCtx.beginPath();
            canvasCtx.arc(pixelX, pixelY, 8, 0, 2 * Math.PI);
            canvasCtx.fillStyle = color;
            canvasCtx.fill();
            
            // Inner highlight (putih di tengah)
            canvasCtx.shadowBlur = 0;
            canvasCtx.beginPath();
            canvasCtx.arc(pixelX, pixelY, 4, 0, 2 * Math.PI);
            canvasCtx.fillStyle = 'white';
            canvasCtx.fill();
        }

        function adjustColor(color, amount) {
            // Fungsi untuk mengubah kecerahan warna
            const num = parseInt(color.replace('#', ''), 16);
            const r = Math.min(255, Math.max(0, (num >> 16) + amount));
            const g = Math.min(255, Math.max(0, ((num >> 8) & 0x00FF) + amount));
            const b = Math.min(255, Math.max(0, (num & 0x0000FF) + amount));
            return `#${((r << 16) | (g << 8) | b).toString(16).padStart(6, '0')}`;
        }

        async function startCamera() {
            try {
                statusDiv.textContent = 'Memuat model AI...';
                statusDiv.className = 'status active';
                
                // Inisialisasi Hands
                hands = new Hands({locateFile: (file) => {
                    return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
                }});
                
                hands.setOptions({
                    maxNumHands: 2,
                    modelComplexity: 1,
                    minDetectionConfidence: 0.7,
                    minTrackingConfidence: 0.5
                });
                
                hands.onResults(onResults);
                
                // Inisialisasi Camera
                camera = new Camera(videoElement, {
                    onFrame: async () => {
                        await hands.send({image: videoElement});
                    },
                    width: 1280,
                    height: 720
                });
                
                await camera.start();
                
                isRunning = true;
                startBtn.disabled = true;
                stopBtn.disabled = false;
                statusDiv.textContent = '✅ Kamera aktif - Tunjukkan tangan Anda!';
                statusDiv.className = 'status active';
                
            } catch (error) {
                console.error('Error:', error);
                statusDiv.textContent = '❌ Error: ' + error.message;
                statusDiv.className = 'status inactive';
            }
        }

        function stopCamera() {
            if (camera) {
                camera.stop();
            }
            if (hands) {
                hands.close();
            }
            
            isRunning = false;
            startBtn.disabled = false;
            stopBtn.disabled = true;
            statusDiv.textContent = 'Kamera dihentikan';
            statusDiv.className = 'status inactive';
            
            // Clear canvas
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
        }

        // Event listeners
        startBtn.addEventListener('click', startCamera);
        stopBtn.addEventListener('click', stopCamera);
    </script>
</body>
</html>
